<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#51c00c" />
    <meta name="robots" content="noindex, nofollow" />
    <title>500 | SmiguelNet</title>
    <meta
      name="description"
      content="A temporary server error occurred. Please try again in a moment."
    />
    <link rel="canonical" href="https://www.smiguel.net/500.html" />
    <link rel="manifest" href="/assets/images/site.webmanifest" />
    <link rel="shortcut icon" href="/assets/favicon/favicon.ico" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap"
    />
    <style>
      :root {
        --bg: #0a0a0a;
        --card: rgba(9, 12, 10, 0.85);
        --border: rgba(255, 255, 255, 0.12);
        --muted: #a1a1aa;
        --text: #e4e4e7;
        --accent: #51c00c;
        --accent-strong: #86db3a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 85% 12%, rgba(81, 192, 12, 0.2), transparent 36%),
          linear-gradient(to right, rgba(128, 128, 128, 0.09) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(128, 128, 128, 0.09) 1px, transparent 1px),
          var(--bg);
        background-size:
          auto,
          40px 40px,
          40px 40px,
          auto;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .panel {
        width: min(760px, 100%);
        border-radius: 28px;
        border: 1px solid var(--border);
        background: var(--card);
        backdrop-filter: blur(8px);
        box-shadow:
          0 0 0 1px rgba(81, 192, 12, 0.18) inset,
          0 0 36px rgba(81, 192, 12, 0.12);
        padding: 34px 30px;
      }

      .kicker {
        display: inline-block;
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--accent-strong);
        margin-bottom: 12px;
      }

      h1 {
        margin: 0;
        font-size: clamp(44px, 8vw, 72px);
        line-height: 0.95;
        font-weight: 800;
        letter-spacing: -0.03em;
        color: #fff;
      }

      p {
        margin: 16px 0 0;
        line-height: 1.65;
        color: var(--muted);
      }

      .cmd {
        margin-top: 22px;
        padding: 14px 16px;
        border-radius: 12px;
        border: 1px solid rgba(81, 192, 12, 0.35);
        background: rgba(81, 192, 12, 0.09);
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
        font-size: 12px;
        color: #d9f5c0;
      }

      .actions {
        margin-top: 26px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .btn {
        border: 1px solid transparent;
        border-radius: 12px;
        padding: 11px 18px;
        text-decoration: none;
        font-weight: 700;
        font-size: 13px;
        transition: 0.2s ease;
      }

      .btn-primary {
        background: var(--accent);
        color: #050505;
      }

      .btn-primary:hover {
        background: var(--accent-strong);
      }

      .btn-ghost {
        border-color: rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.02);
        color: #fff;
      }

      .btn-ghost:hover {
        border-color: rgba(81, 192, 12, 0.45);
        background: rgba(81, 192, 12, 0.1);
      }

      .foot {
        margin-top: 26px;
        padding-top: 16px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        font-size: 12px;
        color: #a1a1aa;
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <span class="kicker">System Fault</span>
      <h1>500</h1>
      <p>
        A temporary server-side issue interrupted this request. The system is still online. Please
        retry in a few moments.
      </p>
      <div class="cmd">$ tail -f /var/log/smiguelnet/error.log</div>
      <div class="actions">
        <a class="btn btn-primary" href="/">Retry From Home</a>
        <a class="btn btn-ghost" href="/profile">Profile</a>
        <a class="btn btn-ghost" href="mailto:sergio@smiguel.net">Report Issue</a>
      </div>
      <footer class="foot">
        <span>Sergio Miguel © 2026</span>
        <span>SmiguelNet Error Document</span>
      </footer>
    </main>
  </body>
</html>
